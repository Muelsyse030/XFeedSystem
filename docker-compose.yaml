version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: feed_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: feed_system
    ports:
      - "3308:3306"
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7
    container_name: feed_redis
    restart: always
    ports:
      - "6380:6379"